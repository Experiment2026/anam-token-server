<!DOCTYPE html>
<html>
<head>
  <title>Avatar Condition</title>
</head>
<body>

<h2>Chat Assistant</h2>

<!-- Avatar video -->
<video id="avatar" autoplay playsinline style="width:400px;"></video>

<!-- Chat UI -->
<div id="chatbox" style="height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px;"></div>

<input id="input" placeholder="Type here..." />
<button onclick="send()">Send</button>

<script type="module">
import { createClient } from "https://esm.sh/@anam-ai/js-sdk";

let client;

// 🔑 Step 1: get session token from Render
const response = await fetch("https://your-render-url.onrender.com/api/session-token", {
  method: "POST"
});
const { sessionToken } = await response.json();

// 🎥 Step 2: initialize Anam
client = createClient(sessionToken);
await client.streamToVideoElement("avatar");

// 💬 Step 3: send messages
window.send = function() {
  const input = document.getElementById("input").value;

  if (!input) return;

  addToChat("You", input);
  client.sendUserMessage(input);

  document.getElementById("input").value = "";
};

// 🧠 Step 4: receive responses
client.addListener("MESSAGE_STREAM_EVENT_RECEIVED", (event) => {
  if (event.role === "PERSONA") {
    addToChat("Assistant", event.content);
  }
});

// 🧾 helper
function addToChat(role, text) {
  const chatbox = document.getElementById("chatbox");
  chatbox.innerHTML += `<p><b>${role}:</b> ${text}</p>`;
  chatbox.scrollTop = chatbox.scrollHeight;
}
</script>

</body>
</html>
