<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar Condition</title>
</head>
<body>
  <h2>Chat Assistant</h2>

  <!-- Hidden avatar -->
  <video id="avatar" autoplay playsinline
    style="position:absolute; left:-9999px; width:1px; height:1px;">
  </video>

  <div id="status">Not connected</div>

  <div id="chatbox" style="height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px;"></div>

  <input id="input" placeholder="Type here..." />
  <button id="startBtn">Start</button>
  <button id="sendBtn">Send</button>

  <script type="module">
  import { createClient, AnamEvent } from "https://esm.sh/@anam-ai/js-sdk";

  let client = null;
  let assistantBuffer = "";

  const statusEl = document.getElementById("status");
  const chatbox = document.getElementById("chatbox");
  const inputEl = document.getElementById("input");
  const startBtn = document.getElementById("startBtn");
  const sendBtn = document.getElementById("sendBtn");

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function addToChat(role, text, id = null) {
    const p = document.createElement("p");
    if (id) p.id = id;
    p.innerHTML = `<b>${role}:</b> ${text}`;
    chatbox.appendChild(p);
    chatbox.scrollTop = chatbox.scrollHeight;
  }

  startBtn.addEventListener("click", async () => {
    try {
      setStatus("Creating session...");

      const response = await fetch("https://anam-token-server-1.onrender.com/api/session-token", {
        method: "POST"
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Failed to get session token");
      }

      client = createClient(data.sessionToken);

      client.addListener(AnamEvent.MESSAGE_STREAM_EVENT_RECEIVED, (event) => {
        console.log("Event:", event);

        if (event.role === "persona") {
          const assistantMsgId = "assistant-msg";

          // Add each chunk to the running response
          assistantBuffer += event.content || "";

          let existing = document.getElementById(assistantMsgId);

          if (!existing) {
            addToChat("Assistant", assistantBuffer, assistantMsgId);
            existing = document.getElementById(assistantMsgId);
          } else {
            existing.innerHTML = `<b>Assistant:</b> ${assistantBuffer}`;
          }

          chatbox.scrollTop = chatbox.scrollHeight;

          // Reset buffer once the response is complete
          if (event.endOfSpeech) {
            assistantBuffer = "";
          }
        }
      });

      setStatus("Connecting...");
      await client.streamToVideoElement("avatar");
      setStatus("Connected");
    } catch (error) {
      console.error(error);
      setStatus("Error: " + error.message);
    }
  });

  sendBtn.addEventListener("click", async () => {
    try {
      if (!client) {
        setStatus("Start the session first");
        return;
      }

      const text = inputEl.value.trim();
      if (!text) return;

      addToChat("You", text);
      inputEl.value = "";

      // Remove old assistant placeholder for the new turn
      const existing = document.getElementById("assistant-msg");
      if (existing) existing.remove();

      assistantBuffer = "";

      await client.sendUserMessage(text);
    } catch (error) {
      console.error(error);
      setStatus("Send error: " + error.message);
    }
  });
</script>
</body>
</html>
