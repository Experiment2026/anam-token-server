<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar Condition</title>
</head>
<body>
  <h2>Chat Assistant</h2>

  <video id="avatar" autoplay playsinline
  style="position:absolute; left:-9999px; width:1px; height:1px;">
</video>

  <div id="status">Not connected</div>
  <div id="chatbox" style="height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px;"></div>

  <input id="input" placeholder="Type here..." />
  <button id="startBtn">Start</button>
  <button id="sendBtn">Send</button>

  <script type="module">
    import { createClient } from "https://esm.sh/@anam-ai/js-sdk";

    let client = null;

    const statusEl = document.getElementById("status");
    const chatbox = document.getElementById("chatbox");
    const inputEl = document.getElementById("input");
    const startBtn = document.getElementById("startBtn");
    const sendBtn = document.getElementById("sendBtn");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function addToChat(role, text) {
      chatbox.innerHTML += `<p><b>${role}:</b> ${text}</p>`;
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    startBtn.addEventListener("click", async () => {
      try {
        setStatus("Creating session...");

        const response = await fetch("https://anam-token-server-1.onrender.com/api/session-token", {
          method: "POST"
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to get session token");
        }

        client = createClient(data.sessionToken);

        setStatus("Connecting...");
        await client.streamToVideoElement("avatar");
        setStatus("Connected");
      } catch (error) {
        console.error(error);
        setStatus("Error: " + error.message);
      }
    });

    sendBtn.addEventListener("click", async () => {
      try {
        if (!client) {
          setStatus("Start the session first");
          return;
        }

        const text = inputEl.value.trim();
        if (!text) return;

        addToChat("You", text);
        inputEl.value = "";

        await client.sendUserMessage(text);
      } catch (error) {
        console.error(error);
        setStatus("Send error: " + error.message);
      }
    });
  </script>
</body>
</html>
